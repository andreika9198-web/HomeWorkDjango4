{% extends 'games/base.html' %}

{% block content %}
<form method="post" enctype="multipart/form-data" class="row">
    <div class="col-6">
        <div class="card-header">
            {% if object %}
            Редактировать игру
            {% else %}
            Добавить игру
            {% endif %}
        </div>
        <div class="card-body">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-outline-success">
                {% if object %}
                Сохранить
                {% else %}
                Добавить
                {% endif %}
            </button>
        </div>
    </div>
</form>
{% endblock %}
